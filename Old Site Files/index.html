<!DOCTYPE html>
<html lang="mwr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>आपरे गाँव रे वास्ते AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #f0f2f5;
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.18);
            --text-color: #333;
            --accent-color: #ff6b6b;
            --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 40px auto;
            text-align: center;
        }

        header {
            margin-bottom: 50px;
            padding: 20px;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--card-shadow);
        }

        h1 {
            font-size: 2.5rem;
            color: #fff;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--card-shadow);
            padding: 30px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-decoration: none;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.5);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: #fff;
        }

        .card p {
            font-size: 1rem;
            line-height: 1.6;
            color: #eee;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 30px;
            background: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: #ff5252;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            color: #fff;
            font-size: 0.9rem;
            text-align: center;
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            .grid-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>आपरे गाँव रे वास्ते AI</h1>
            <p style="color: #eee; font-size: 1.2rem; margin-top: 10px;">Artificial Intelligence for Your Village</p>
        </header>

        <div class="grid-container">
            <!-- Booklet 1 Card -->
            <a href="booklet1/booklet1.html" class="card">
                <img src="images/img-001.png" alt="Booklet 1 Cover">
                <h2>पुस्तिका 1</h2>
                <p>गांव रै वास्तै एआई री मूल बातां अर इणरो असर ।</p>
                <button class="btn">Read Booklet 1</button>
            </a>

            <!-- Booklet 2 Card -->
            <a href="booklet2/booklet2.html" class="card">
                <img src="images/img-200.png" alt="Booklet 2 Cover">
                <h2>पुस्तिका  2</h2>
                <p>गहरे विषय अर व्यावहारिक प्रयोग </p>
                <button class="btn">Read Booklet 2</button>
            </a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Sovereign AI. All rights reserved.</p>
    </footer>

</body>
</html>
